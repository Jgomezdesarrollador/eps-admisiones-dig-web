version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: epsadmissions-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "pass.dg.2026"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    restart: unless-stopped

  mongo:
    image: mongo:8
    container_name: epsadmissions-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  sql_data:
  mongo_data: